<!DOCTYPE html>
<html class="dark" lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CostPulse — Analytics Intelligence</title>

<!-- Stitch Design Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

<!-- Tailwind CDN with Stitch config -->
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "primary":                  "#c3f5ff",
        "on-primary":               "#00363d",
        "primary-container":        "#00e5ff",
        "on-primary-container":     "#00626e",
        "primary-fixed":            "#9cf0ff",
        "primary-fixed-dim":        "#00daf3",
        "secondary":                "#d8b9ff",
        "on-secondary":             "#450086",
        "secondary-container":      "#6e06d0",
        "on-secondary-container":   "#d5b5ff",
        "tertiary":                 "#edeaff",
        "tertiary-container":       "#cdcdf6",
        "on-tertiary-container":    "#555678",
        "surface":                  "#051424",
        "surface-dim":              "#051424",
        "surface-bright":           "#2c3a4c",
        "surface-container-lowest": "#010f1f",
        "surface-container-low":    "#0d1c2d",
        "surface-container":        "#122131",
        "surface-container-high":   "#1c2b3c",
        "surface-container-highest":"#273647",
        "surface-variant":          "#273647",
        "on-surface":               "#d4e4fa",
        "on-surface-variant":       "#bac9cc",
        "outline":                  "#849396",
        "outline-variant":          "#3b494c",
        "surface-tint":             "#00daf3",
        "error":                    "#ffb4ab",
        "error-container":          "#93000a",
        "background":               "#051424",
        "on-background":            "#d4e4fa",
      },
      fontFamily: {
        "grotesk": ["Hanken Grotesk", "sans-serif"],
        "inter":   ["Inter", "sans-serif"],
        "mono":    ["JetBrains Mono", "monospace"],
      },
    }
  }
}
</script>

<style>
  /* ── Stitch glass system ── */
  .glass-panel {
    background: rgba(12, 20, 40, 0.55);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
  }
  .glass-card {
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: inset 1px 1px 0 rgba(255,255,255,0.09);
  }
  .glass-input {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    box-shadow: inset 1px 1px 0 rgba(255,255,255,0.08), 0 0 0 1px rgba(132,147,150,0.25);
  }
  /* ── Material Symbols ── */
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;
    font-size: 20px; line-height: 1;
  }
  .material-symbols-outlined.fill { font-variation-settings: 'FILL' 1; }
  .ms-sm { font-size: 16px !important; }
  .ms-xs { font-size: 14px !important; }
  /* ── Animations ── */
  @keyframes fadeUp   { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
  @keyframes spin     { to   { transform:rotate(360deg); } }
  @keyframes pulse-dot{ 0%,100%{opacity:.3;transform:scale(.8)} 50%{opacity:1;transform:scale(1)} }
  .fade-up  { animation: fadeUp .28s ease; }
  .spin     { animation: spin .85s linear infinite; }
  /* scrollbar */
  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:#273647; border-radius:4px; }
  /* chat bubble shapes — Stitch spec */
  .bubble-user { border-radius: 1rem 1rem 0.25rem 1rem; }
  .bubble-bot  { border-radius: 1rem 1rem 1rem 0.25rem; }
  /* glow on send */
  .btn-glow { box-shadow: 0 0 18px rgba(0,229,255,.35); }
  /* typing dots */
  .dot-typing i { display:inline-block; width:5px; height:5px; border-radius:50%; background:#00daf3; margin:0 2px; animation: pulse-dot 1.1s ease infinite; }
  .dot-typing i:nth-child(2){ animation-delay:.2s; }
  .dot-typing i:nth-child(3){ animation-delay:.4s; }
</style>
</head>
<body class="bg-background text-on-background font-inter overflow-hidden h-screen w-screen relative">

<div id="root"></div>

<!-- API config -->
<script>
  window.COSTPULSE_API = "https://opensearch-robd-production.up.railway.app";
</script>

<!-- React 18 -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>

<!-- WebGL Aurora shader from Stitch -->
<script type="text/babel" src="shader.jsx"></script>
<!-- JSX modules -->
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="dashboard.jsx"></script>
<script type="text/babel" src="chat.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
