<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CostPulse — Cost Analytics RS Sehat Selalu</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="root"></div>

<!-- ── Konfigurasi API URL ─────────────────────────────────────── -->
<!-- Ganti dengan URL Railway backend saat deploy ke Vercel        -->
<script>
  window.COSTPULSE_API = (function() {
    // Jika ada env yang diinjeksikan oleh Vite/server, gunakan itu
    if (typeof __VITE_API_URL__ !== "undefined" && __VITE_API_URL__) return __VITE_API_URL__;
    // Fallback: local dev
    return "http://localhost:8000";
  })();
</script>

<!-- ── React & Babel (CDN) ────────────────────────────────────── -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
        integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
        crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
        integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
        crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
        integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
        crossorigin="anonymous"></script>

<!-- ── Aurora canvas background ──────────────────────────────── -->
<script type="module" src="aurora.js"></script>

<!-- ── JSX files — urutan load penting ──────────────────────── -->
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="dashboard.jsx"></script>
<script type="text/babel" src="chat.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
